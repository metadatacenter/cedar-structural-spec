---
# CEDAR Structural Model — LinkML prototype
#
# This file translates spec/grammar.md (EBNF abstract grammar) into
# a LinkML YAML schema. It is a prototype to evaluate how well the
# grammar maps to LinkML concepts; it does not yet include every
# annotation, constraint, or documentation string present in the
# normative EBNF source.
#
# Key mapping decisions:
#  - EBNF union productions (e.g. Field ::= TextField | …) become
#    abstract LinkML classes whose concrete subclasses use `is_a`.
#  - EBNF constructor productions (e.g. TextField ::= text_field(…))
#    become concrete classes with typed attributes.
#  - Typed identifier wrappers (TextFieldId, NumericFieldId, …) are
#    kept as distinct classes to preserve the CEDAR strong-typing
#    guarantee: you cannot reference a field of the wrong kind.
#  - Simple string/IRI wrapper productions (Label, Notation, …) are
#    collapsed to typed attributes rather than full classes for brevity.
#  - Choice field specs are split into uniform-value-kind variants
#    (LiteralSingleChoiceFieldSpec, ControlledTermSingleChoiceFieldSpec, etc.)
#    eliminating mixed-value-kind unions entirely for the choice subsystem.
#  - Recursive constructs (AttributeValue carrying a Value, and
#    NestedTemplateInstance carrying InstanceValue*) are expressed
#    with a forward reference; concrete generators may need to handle
#    these specially.
#  - All properties are expressed as inline class attributes rather
#    than global slots, avoiding cross-class name conflicts in generated
#    artefacts.
#
# Fit assessment notes are inline where the mapping is non-trivial.

id: https://metadatacenter.org/cedar-model
name: cedar-model
title: CEDAR Structural Model
description: >-
  Abstract structural model for CEDAR metadata templates, fields,
  values, and instances. Format-independent; concrete serializations
  such as CTM 1.6.0 are defined separately.

prefixes:
  linkml: https://w3id.org/linkml/
  cedar:  https://metadatacenter.org/cedar-model/
  xsd:    http://www.w3.org/2001/XMLSchema#
  schema: http://schema.org/
  pav:    http://purl.org/pav/
  bibo:   http://purl.org/ontology/bibo/
  oslc:   http://open-services.net/ns/core#

default_prefix: cedar
default_range: string
imports:
  - linkml:types


# ──────────────────────────────────────────────────────────────────
# Primitive types
# ──────────────────────────────────────────────────────────────────
types:
  AsciiIdentifier:
    uri: xsd:string
    base: str
    pattern: "^[A-Za-z][A-Za-z0-9_-]*$"
    description: >-
      An ASCII identifier that begins with a letter followed by letters,
      digits, underscores, or hyphens. Used as EmbeddedArtifactKey values.

  NonNegativeInteger:
    uri: xsd:nonNegativeInteger
    base: int
    description: A non-negative integer (≥ 0).

  Year:
    uri: xsd:gYear
    base: str
    description: A calendar year in ISO 8601 / XSD gYear format (e.g. "2024").


# ──────────────────────────────────────────────────────────────────
# Enumerations
# ──────────────────────────────────────────────────────────────────
enums:

  ValueRequirementEnum:
    description: >-
      Whether a value is required, recommended, or optional at an
      embedding site.
    permissible_values:
      Required:
        description: A value must be present for conformance.
      Recommended:
        description: >-
          Absence does not cause conformance failure, but implementations
          SHOULD encourage entry.
      Optional:
        description: Absence does not cause conformance failure.

  VisibilityEnum:
    description: Whether an embedded artifact is shown in rendered interfaces.
    permissible_values:
      Visible: {}
      Hidden: {}

  DateValueTypeEnum:
    description: Precision of a date field — year or full date.
    permissible_values:
      YearValueType: {}
      FullDateValueType: {}

  DateTimeValueTypeEnum:
    description: Finest permitted precision of a date-time field.
    permissible_values:
      DateHourMinuteValueType: {}
      DateHourMinuteSecondValueType: {}
      DateHourMinuteSecondFractionValueType: {}

  TimePrecisionEnum:
    description: Finest permitted precision of a time field.
    permissible_values:
      HourMinutePrecision: {}
      HourMinuteSecondPrecision: {}
      HourMinuteSecondFractionPrecision: {}

  TimezoneRequirementEnum:
    description: Whether a time or date-time value must carry an explicit timezone offset.
    permissible_values:
      TimezoneRequired: {}
      TimezoneNotRequired: {}

  TimeFormatEnum:
    description: Clock format for rendering a time field.
    permissible_values:
      TwelveHourTimeFormat: {}
      TwentyFourHourTimeFormat: {}

  DateComponentOrderEnum:
    description: Display order for date components.
    permissible_values:
      DayMonthYearOrder: {}
      MonthDayYearOrder: {}
      YearMonthDayOrder: {}

  TextRenderingHintEnum:
    description: Preferred rendering style for a text field input.
    permissible_values:
      SingleLineTextRenderingHint: {}
      MultiLineTextRenderingHint: {}

  SingleChoiceRenderingHintEnum:
    description: Preferred rendering style for a single-selection choice field.
    permissible_values:
      RadioRenderingHint: {}
      SingleSelectDropdownRenderingHint: {}

  MultipleChoiceRenderingHintEnum:
    description: Preferred rendering style for a multiple-selection choice field.
    permissible_values:
      CheckboxRenderingHint: {}
      MultiSelectDropdownRenderingHint: {}

  NumericRenderingHintEnum:
    description: Preferred rendering style for a numeric field input.
    permissible_values:
      NumericInputRenderingHint: {}


# ──────────────────────────────────────────────────────────────────
# Classes
# ──────────────────────────────────────────────────────────────────
classes:

  # ----------------------------------------------------------------
  # Artifact metadata
  # ----------------------------------------------------------------

  DescriptiveMetadata:
    description: Human-readable name and description of an artifact.
    attributes:
      name:
        range: string
        required: true
        slot_uri: schema:name
        description: Human-readable name of the artifact.
      description:
        range: string
        slot_uri: schema:description
        description: Human-readable description of the artifact.

  TemporalProvenance:
    description: Creation and modification timestamps for an artifact.
    attributes:
      created_on:
        range: datetime
        slot_uri: pav:createdOn
        description: Creation timestamp.
      last_updated_on:
        range: datetime
        slot_uri: pav:lastUpdatedOn
        description: Last-update timestamp.
      created_by:
        range: uri
        slot_uri: pav:createdBy
        description: IRI of the agent that created the artifact.
      modified_by:
        range: uri
        slot_uri: pav:authoredBy
        description: IRI of the agent that last modified the artifact.

  SchemaVersioning:
    description: Schema version, publication status, and artifact version.
    attributes:
      schema_version:
        range: string
        required: true
        slot_uri: schema:schemaVersion
        description: Version string of the JSON Schema used.
      status:
        range: string
        slot_uri: bibo:status
        description: Publication status of the artifact.
      artifact_version:
        range: string
        slot_uri: pav:version
        description: Version of the artifact itself.

  ArtifactMetadata:
    description: Core metadata carried by every CEDAR artifact.
    attributes:
      descriptive_metadata:
        range: DescriptiveMetadata
        required: true
        inlined: true
        description: Human-readable name and description of the artifact.
      temporal_provenance:
        range: TemporalProvenance
        inlined: true
        description: Creation and modification timestamps for the artifact.
      modified_by:
        range: uri
        slot_uri: oslc:modifiedBy
        description: IRI of the agent recorded in OSLC modification provenance.

  SchemaArtifactMetadata:
    is_a: ArtifactMetadata
    description: Artifact metadata extended with schema versioning for Template and Field.
    attributes:
      schema_versioning:
        range: SchemaVersioning
        required: true
        inlined: true
        description: Schema version, publication status, and artifact version string.

  # ----------------------------------------------------------------
  # Core artifact hierarchy
  # ----------------------------------------------------------------

  Artifact:
    abstract: true
    description: Abstract root of all CEDAR artifact types.
    attributes:
      artifact_iri:
        range: uri
        identifier: true
        description: The IRI that uniquely and persistently identifies this artifact.

  SchemaArtifact:
    is_a: Artifact
    abstract: true
    description: >-
      A schema artifact (Template or Field) that defines the structure and
      semantics of instance data.
    attributes:
      schema_artifact_metadata:
        range: SchemaArtifactMetadata
        required: true
        inlined: true
        description: >-
          Identity, descriptive, provenance, and versioning metadata for
          this schema artifact.

  # ----------------------------------------------------------------
  # Template
  # ----------------------------------------------------------------

  Template:
    is_a: SchemaArtifact
    description: >-
      A reusable schema artifact that composes embedded fields, nested
      templates, and presentation components into a form for capturing
      structured metadata.
    attributes:
      header:
        range: string
        description: Optional header text displayed above the template form.
      footer:
        range: string
        description: Optional footer text displayed below the template form.
      embedded_artifacts:
        range: EmbeddedArtifact
        multivalued: true
        inlined: true
        description: The ordered list of embedded artifacts within a Template.

  # ----------------------------------------------------------------
  # Field hierarchy
  # ----------------------------------------------------------------

  Field:
    is_a: SchemaArtifact
    abstract: true
    description: >-
      A reusable schema artifact that captures a single datum of a
      particular type. Every concrete Field carries exactly one FieldSpec.

  TextField:
    is_a: Field
    description: A Field that accepts free-text string values.
    attributes:
      field_spec:
        range: TextFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  NumericField:
    is_a: Field
    description: A Field that accepts numeric values with an explicit XML Schema datatype.
    attributes:
      field_spec:
        range: NumericFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  DateField:
    is_a: Field
    description: A Field that accepts date values at a specified precision (year, year-month, or full date).
    attributes:
      field_spec:
        range: DateFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  TimeField:
    is_a: Field
    description: A Field that accepts time-of-day values.
    attributes:
      field_spec:
        range: TimeFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  DateTimeField:
    is_a: Field
    description: A Field that accepts date-time values at a specified precision.
    attributes:
      field_spec:
        range: DateTimeFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  ControlledTermField:
    is_a: Field
    description: A Field whose values must be drawn from a specified controlled vocabulary.
    attributes:
      field_spec:
        range: ControlledTermFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  SingleChoiceField:
    is_a: Field
    description: A Field whose value must be exactly one option from a declared choice list.
    attributes:
      field_spec:
        range: SingleChoiceFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  MultipleChoiceField:
    is_a: Field
    description: A Field whose values are one or more options selected from a declared choice list.
    attributes:
      field_spec:
        range: MultipleChoiceFieldSpec
        required: true
        inlined: true
        description: The semantic configuration for this field, specifying value kind, constraints, and rendering hints.

  LinkField:
    is_a: Field
    description: A Field whose value is a hyperlink or URL.

  EmailField:
    is_a: Field
    description: A Field that accepts an email address value.

  PhoneNumberField:
    is_a: Field
    description: A Field that accepts a telephone number value.

  OrcidField:
    is_a: Field
    description: A Field that accepts an ORCID identifier value.

  RorField:
    is_a: Field
    description: A Field that accepts a ROR (Research Organization Registry) identifier value.

  DoiField:
    is_a: Field
    description: A Field that accepts a DOI (Digital Object Identifier) value.

  PubMedIdField:
    is_a: Field
    description: A Field that accepts a PubMed identifier value.

  RridField:
    is_a: Field
    description: A Field that accepts an RRID (Research Resource Identifier) value.

  NihGrantIdField:
    is_a: Field
    description: A Field that accepts an NIH grant identifier value.

  AttributeValueField:
    is_a: Field
    description: >-
      A field whose values are named attribute–value pairs with names
      not known at schema-definition time.

  # ----------------------------------------------------------------
  # Presentation components
  # ----------------------------------------------------------------

  PresentationComponent:
    is_a: Artifact
    abstract: true
    description: >-
      A reusable artifact that contributes presentation or instructional
      structure to a rendered template. Produces no InstanceValue.
    attributes:
      artifact_metadata:
        range: ArtifactMetadata
        required: true
        inlined: true
        description: Identity, descriptive, and provenance metadata for this artifact.

  RichTextComponent:
    is_a: PresentationComponent
    description: A PresentationComponent that displays a fragment of HTML rich text.
    attributes:
      html_content:
        range: string
        description: HTML fragment carried by a RichTextComponent.

  ImageComponent:
    is_a: PresentationComponent
    description: A PresentationComponent that displays an image at a specified IRI.
    attributes:
      image_source:
        range: uri
        description: IRI of the image resource for an ImageComponent.

  YoutubeVideoComponent:
    is_a: PresentationComponent
    description: A PresentationComponent that embeds a YouTube video.
    attributes:
      youtube_video_source:
        range: uri
        description: IRI of the YouTube video for a YoutubeVideoComponent.

  SectionBreakComponent:
    is_a: PresentationComponent
    description: A PresentationComponent that inserts a visual section break between form areas.

  PageBreakComponent:
    is_a: PresentationComponent
    description: A PresentationComponent that inserts a page break in print views of a form.

  # ----------------------------------------------------------------
  # Embedded artifacts
  # ----------------------------------------------------------------

  EmbeddedArtifact:
    abstract: true
    description: >-
      An artifact reference embedded within a Template, together with the
      embedding-specific properties that govern its use in that context.
    attributes:
      embedded_artifact_key:
        range: AsciiIdentifier
        required: true
        description: >-
          Local identifier of an EmbeddedArtifact within its containing Template.
          Must be unique within that Template.
      value_requirement:
        range: ValueRequirementEnum
        description: >-
          Whether a value for this embedded artifact is required, recommended,
          or optional. Defaults to Optional when absent.
      min_cardinality:
        range: NonNegativeInteger
        description: Minimum number of occurrences. Default is 1.
      max_cardinality:
        range: NonNegativeInteger
        description: >-
          Maximum number of occurrences. Absent means unbounded. Default is 1
          when Cardinality as a whole is absent.
      visibility:
        range: VisibilityEnum
        description: >-
          Whether the embedded artifact is shown in rendered interfaces.
          Defaults to Visible when absent.
      label_override:
        range: string
        description: >-
          Template-specific label that overrides the referenced artifact's
          default label at this embedding site.
      alternative_labels:
        range: string
        multivalued: true
        description: Additional alternative labels for this embedding site.

  EmbeddedField:
    is_a: EmbeddedArtifact
    abstract: true
    description: An embedded reference to a reusable Field.
    attributes:
      embedding_property:
        range: EmbeddingProperty
        inlined: true
        description: >-
          The RDF property IRI that associates this field's value with
          the metadata record in this template context.

  # Concrete EmbeddedField variants carry a typed field reference and
  # an optional default value.  The reference type enforces that only a
  # field of the correct kind can be embedded.

  EmbeddedTextField:
    is_a: EmbeddedField
    description: An embedded reference to a TextField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced TextField.
      default_value:
        range: TextValue
        inlined: true
        description: Pre-populated default text value for this embedding site.

  EmbeddedNumericField:
    is_a: EmbeddedField
    description: An embedded reference to a NumericField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced NumericField.
      default_value:
        range: NumericValue
        inlined: true
        description: Pre-populated default numeric value for this embedding site.

  EmbeddedDateField:
    is_a: EmbeddedField
    description: An embedded reference to a DateField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced DateField.
      default_value:
        range: DateValue
        inlined: true
        description: Pre-populated default date value for this embedding site.

  EmbeddedTimeField:
    is_a: EmbeddedField
    description: An embedded reference to a TimeField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced TimeField.
      default_value:
        range: TimeValue
        inlined: true
        description: Pre-populated default time value for this embedding site.

  EmbeddedDateTimeField:
    is_a: EmbeddedField
    description: An embedded reference to a DateTimeField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced DateTimeField.
      default_value:
        range: DateTimeValue
        inlined: true
        description: Pre-populated default date-time value for this embedding site.

  EmbeddedControlledTermField:
    is_a: EmbeddedField
    description: An embedded reference to a ControlledTermField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced ControlledTermField.
      default_value:
        range: ControlledTermValue
        inlined: true
        description: Pre-populated default controlled-term value for this embedding site.

  EmbeddedSingleChoiceField:
    is_a: EmbeddedField
    description: An embedded reference to a SingleChoiceField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced SingleChoiceField.
      default_value:
        range: ChoiceValue
        inlined: true
        description: Pre-populated default choice value for this embedding site.

  EmbeddedMultipleChoiceField:
    is_a: EmbeddedField
    description: An embedded reference to a MultipleChoiceField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced MultipleChoiceField.
      default_values:
        range: ChoiceValue
        multivalued: true
        inlined: true
        description: Pre-populated default choice values for this multiple-choice embedding site.

  EmbeddedLinkField:
    is_a: EmbeddedField
    description: An embedded reference to a LinkField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced LinkField.
      default_value:
        range: LinkValue
        inlined: true
        description: Pre-populated default link value for this embedding site.

  EmbeddedEmailField:
    is_a: EmbeddedField
    description: An embedded reference to an EmailField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced EmailField.

  EmbeddedPhoneNumberField:
    is_a: EmbeddedField
    description: An embedded reference to a PhoneNumberField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced PhoneNumberField.

  EmbeddedOrcidField:
    is_a: EmbeddedField
    description: An embedded reference to an OrcidField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced OrcidField.
      default_value:
        range: OrcidValue
        inlined: true
        description: Pre-populated default ORCID value for this embedding site.

  EmbeddedRorField:
    is_a: EmbeddedField
    description: An embedded reference to a RorField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced RorField.
      default_value:
        range: RorValue
        inlined: true
        description: Pre-populated default ROR value for this embedding site.

  EmbeddedDoiField:
    is_a: EmbeddedField
    description: An embedded reference to a DoiField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced DoiField.
      default_value:
        range: DoiValue
        inlined: true
        description: Pre-populated default DOI value for this embedding site.

  EmbeddedPubMedIdField:
    is_a: EmbeddedField
    description: An embedded reference to a PubMedIdField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced PubMedIdField.
      default_value:
        range: PubMedIdValue
        inlined: true
        description: Pre-populated default PubMed ID value for this embedding site.

  EmbeddedRridField:
    is_a: EmbeddedField
    description: An embedded reference to an RridField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced RridField.
      default_value:
        range: RridValue
        inlined: true
        description: Pre-populated default RRID value for this embedding site.

  EmbeddedNihGrantIdField:
    is_a: EmbeddedField
    description: An embedded reference to an NihGrantIdField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced NihGrantIdField.
      default_value:
        range: NihGrantIdValue
        inlined: true
        description: Pre-populated default NIH grant ID value for this embedding site.

  EmbeddedAttributeValueField:
    is_a: EmbeddedField
    description: An embedded reference to an AttributeValueField within a Template.
    attributes:
      field_reference:
        range: uri
        required: true
        description: IRI of the referenced AttributeValueField.

  EmbeddedTemplate:
    is_a: EmbeddedArtifact
    description: An embedded reference to a nested Template.
    attributes:
      template_reference:
        range: uri
        required: true
        description: IRI of the referenced Template.
      embedding_property:
        range: EmbeddingProperty
        inlined: true
        description: >-
          The RDF property IRI that associates the nested template's values
          with the metadata record in this template context.

  EmbeddedPresentationComponent:
    is_a: EmbeddedArtifact
    description: >-
      An embedded reference to a PresentationComponent. Contributes no
      InstanceValue; invisible to the instance model.
    attributes:
      component_reference:
        range: uri
        required: true
        description: IRI of the referenced PresentationComponent.

  EmbeddingProperty:
    description: >-
      Associates a semantic RDF property IRI with an EmbeddedField or
      EmbeddedTemplate in a specific template context.
    attributes:
      property_iri:
        range: uri
        description: >-
          The RDF property IRI that the embedded artifact's value represents
          in this template context.
      property_label:
        range: string
        description: Human-readable label for the property IRI.

  # ----------------------------------------------------------------
  # Field specs
  # ----------------------------------------------------------------

  FieldSpec:
    abstract: true
    description: >-
      The semantic configuration block carried by a concrete Field artifact.
      Specifies what kind of value the field accepts and any constraints.

  TextFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a TextField, specifying optional text constraints
      (length bounds, regex) and a rendering hint.
    attributes:
      min_length:
        range: NonNegativeInteger
        description: Minimum number of Unicode characters permitted in a text value.
      max_length:
        range: NonNegativeInteger
        description: Maximum number of Unicode characters permitted in a text value.
      validation_regex:
        range: string
        description: >-
          A regular expression that the text value must match. Conforming values
          must satisfy this pattern when present.
      text_rendering_hint:
        range: TextRenderingHintEnum
        description: Preferred rendering style for the text input widget.
      default_value:
        range: TextValue
        inlined: true
        description: Pre-populated default text value for this embedding site.

  NumericFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a NumericField, specifying the XML Schema datatype,
      optional precision, unit, and value bounds.
    attributes:
      numeric_datatype:
        range: uri
        required: true
        description: XML Schema numeric datatype IRI (e.g. xsd:decimal, xsd:integer).
      numeric_precision:
        range: NonNegativeInteger
        description: Maximum number of decimal places permitted in a numeric value.
      numeric_rendering_hint:
        range: NumericRenderingHintEnum
        description: Preferred rendering style for the numeric input widget.
      unit:
        range: Unit
        inlined: true
        description: Optional unit of measurement for numeric values entered into this field.
      min_value:
        range: NumericValue
        inlined: true
        description: Minimum permitted numeric value, inclusive.
      max_value:
        range: NumericValue
        inlined: true
        description: Maximum permitted numeric value, inclusive.

  DateFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a DateField, specifying the permitted date precision
      and an optional display-order rendering hint.
    attributes:
      date_value_type:
        range: DateValueTypeEnum
        required: true
        description: >-
          Permitted granularity for a date field — year only, year-month, or
          full calendar date.
      rendering_hint:
        range: DateRenderingHint
        inlined: true
        description: Optional rendering hint specifying date component display order.

  TimeFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a TimeField, specifying precision, timezone requirement,
      and an optional clock-format rendering hint.
    attributes:
      time_precision:
        range: TimePrecisionEnum
        description: Finest permitted granularity for a time value (hours-minutes, seconds, or fractions).
      timezone_requirement:
        range: TimezoneRequirementEnum
        description: Whether an explicit timezone offset is required on time or date-time values.
      rendering_hint:
        range: TimeRenderingHint
        inlined: true
        description: Optional rendering hint specifying time format.

  DateTimeFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a DateTimeField, specifying the permitted datetime
      precision, timezone requirement, and an optional rendering hint.
    attributes:
      date_time_value_type:
        range: DateTimeValueTypeEnum
        required: true
        description: >-
          Finest permitted granularity for a date-time value — hours-minutes,
          seconds, or fractional seconds.
      timezone_requirement:
        range: TimezoneRequirementEnum
        description: Whether an explicit timezone offset is required on time or date-time values.
      rendering_hint:
        range: DateTimeRenderingHint
        inlined: true
        description: Optional rendering hint specifying time format for date-time display.

  ControlledTermFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a ControlledTermField, specifying the authorised
      controlled term sources from which values may be drawn.
    attributes:
      controlled_term_sources:
        range: ControlledTermSource
        multivalued: true
        required: true
        inlined: true
        description: The ordered set of controlled term sources authorised for this field.

  SingleChoiceFieldSpec:
    is_a: FieldSpec
    abstract: true
    description: >-
      Abstract base for single-selection choice field specs. Concrete
      subclasses differ by the kind of value options they declare.

  LiteralSingleChoiceFieldSpec:
    is_a: SingleChoiceFieldSpec
    description: A single-selection choice field spec whose options are literal values.
    attributes:
      literal_choice_options:
        range: LiteralChoiceOption
        multivalued: true
        required: true
        inlined: true
        description: The declared literal options for this choice field.
      single_choice_rendering_hint:
        range: SingleChoiceRenderingHintEnum
        description: Preferred rendering style for a single-selection choice widget.

  ControlledTermSingleChoiceFieldSpec:
    is_a: SingleChoiceFieldSpec
    description: A single-selection choice field spec whose options are controlled vocabulary terms.
    attributes:
      controlled_term_choice_options:
        range: ControlledTermChoiceOption
        multivalued: true
        required: true
        inlined: true
        description: The declared controlled-term options for this choice field.
      single_choice_rendering_hint:
        range: SingleChoiceRenderingHintEnum
        description: Preferred rendering style for a single-selection choice widget.

  MultipleChoiceFieldSpec:
    is_a: FieldSpec
    abstract: true
    description: >-
      Abstract base for multiple-selection choice field specs. Concrete
      subclasses differ by the kind of value options they declare.

  LiteralMultipleChoiceFieldSpec:
    is_a: MultipleChoiceFieldSpec
    description: A multiple-selection choice field spec whose options are literal values.
    attributes:
      literal_choice_options:
        range: LiteralChoiceOption
        multivalued: true
        required: true
        inlined: true
        description: The declared literal options for this choice field.
      multiple_choice_rendering_hint:
        range: MultipleChoiceRenderingHintEnum
        description: Preferred rendering style for a multiple-selection choice widget.

  ControlledTermMultipleChoiceFieldSpec:
    is_a: MultipleChoiceFieldSpec
    description: A multiple-selection choice field spec whose options are controlled vocabulary terms.
    attributes:
      controlled_term_choice_options:
        range: ControlledTermChoiceOption
        multivalued: true
        required: true
        inlined: true
        description: The declared controlled-term options for this choice field.
      multiple_choice_rendering_hint:
        range: MultipleChoiceRenderingHintEnum
        description: Preferred rendering style for a multiple-selection choice widget.

  LinkFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a LinkField. Currently carries no additional
      configuration beyond field identity.

  EmailFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for an EmailField. Currently carries no additional
      configuration beyond field identity.

  PhoneNumberFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a PhoneNumberField. Currently carries no additional
      configuration beyond field identity.

  OrcidFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for an OrcidField. Currently carries no additional
      configuration beyond field identity.

  RorFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a RorField. Currently carries no additional
      configuration beyond field identity.

  DoiFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a DoiField. Currently carries no additional
      configuration beyond field identity.

  PubMedIdFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for a PubMedIdField. Currently carries no additional
      configuration beyond field identity.

  RridFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for an RridField. Currently carries no additional
      configuration beyond field identity.

  NihGrantIdFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for an NihGrantIdField. Currently carries no additional
      configuration beyond field identity.

  AttributeValueFieldSpec:
    is_a: FieldSpec
    description: >-
      Configuration for an AttributeValueField. Currently carries no additional
      configuration beyond field identity.

  Unit:
    description: An identified measurement or quantity unit with an optional label.
    attributes:
      unit_iri:
        range: uri
        required: true
        description: IRI identifying the unit of measurement.
      label:
        range: string
        description: Human-readable label for this unit.

  ChoiceOption:
    abstract: true
    description: >-
      Abstract base for a single permissible option in a ChoiceFieldSpec.
      Concrete subclasses are LiteralChoiceOption and ControlledTermChoiceOption.
    attributes:
      is_default_option:
        range: boolean
        description: Whether this ChoiceOption is pre-selected by default.

  LiteralChoiceOption:
    is_a: ChoiceOption
    description: A choice option whose value is a literal (text or other scalar).
    attributes:
      literal:
        range: Literal
        required: true
        inlined: true
        description: The literal value of this choice option.

  ControlledTermChoiceOption:
    is_a: ChoiceOption
    description: A choice option whose value is a controlled vocabulary term.
    attributes:
      controlled_term_value:
        range: ControlledTermValue
        required: true
        inlined: true
        description: The controlled vocabulary term that this choice option represents.

  DateRenderingHint:
    description: A rendering hint specifying the preferred display order of date components.
    attributes:
      date_component_order:
        range: DateComponentOrderEnum
        description: Preferred display order of day, month, and year components.

  TimeRenderingHint:
    description: A rendering hint specifying the preferred clock format for a time field.
    attributes:
      time_format:
        range: TimeFormatEnum
        description: Preferred clock format (12-hour or 24-hour) for rendering a time field.

  DateTimeRenderingHint:
    description: A rendering hint specifying the preferred clock format for a date-time field.
    attributes:
      time_format:
        range: TimeFormatEnum
        description: Preferred clock format (12-hour or 24-hour) for rendering a date-time field.

  # ----------------------------------------------------------------
  # Controlled term sources
  # ----------------------------------------------------------------

  ControlledTermSource:
    abstract: true
    description: >-
      Specifies an ontological authority from which controlled-term values
      may be drawn.

  OntologySource:
    is_a: ControlledTermSource
    description: An entire ontology as a controlled term source.
    attributes:
      ontology_reference:
        range: OntologyReference
        required: true
        inlined: true
        description: The ontology used as the source of controlled terms.

  BranchSource:
    is_a: ControlledTermSource
    description: A branch of an ontology rooted at a given term.
    attributes:
      ontology_reference:
        range: OntologyReference
        required: true
        inlined: true
        description: The ontology used as the source of controlled terms.
      root_term_iri:
        range: uri
        description: IRI of the ontology class at the root of a BranchSource.
      root_term_label:
        range: string
        description: Human-readable label of the root term for a BranchSource.
      max_traversal_depth:
        range: NonNegativeInteger
        description: Maximum depth of the ontology hierarchy to traverse from the root term.

  ClassSource:
    is_a: ControlledTermSource
    description: A specific set of ontology classes.
    attributes:
      classes:
        range: ControlledTermClass
        multivalued: true
        required: true
        inlined: true
        description: The specific ontology classes that form this controlled term source.

  ValueSetSource:
    is_a: ControlledTermSource
    description: An external value set referenced by identifier, name, and IRI.
    attributes:
      value_set_identifier:
        range: string
        required: true
        description: Stable string identifier for the value set.
      value_set_name:
        range: string
        description: Human-readable name of the value set.
      value_set_iri:
        range: uri
        description: Resolvable IRI for the value set.

  OntologyReference:
    description: Identifies an ontology, optionally with display hint metadata.
    attributes:
      ontology_iri:
        range: uri
        description: IRI that uniquely identifies the ontology.
      ontology_acronym:
        range: string
        description: Short acronym for the ontology (e.g. OBI, UBERON).
      ontology_name:
        range: string
        description: Full human-readable name of the ontology.

  ControlledTermClass:
    description: A single ontology class within a ClassSource.
    attributes:
      term_iri:
        range: uri
        required: true
        description: IRI identifying a controlled vocabulary term.
      label:
        range: string
        description: Human-readable label for this ontology class.
      ontology_reference:
        range: OntologyReference
        required: true
        inlined: true
        description: The ontology used as the source of controlled terms.

  # ----------------------------------------------------------------
  # Literals
  # ----------------------------------------------------------------

  Literal:
    abstract: true
    description: An abstract base for all typed literal forms.

  StringLiteral:
    is_a: Literal
    description: A plain Unicode string literal without a language tag.
    attributes:
      lexical_form:
        range: string
        required: true
        description: The string content of this literal.

  LangStringLiteral:
    is_a: Literal
    description: A string literal paired with a BCP 47 language tag.
    attributes:
      lexical_form:
        range: string
        required: true
        description: The string content of this language-tagged literal.
      language_tag:
        range: string
        required: true
        description: BCP 47 language tag identifying the language of this string.

  # TextLiteral ::= StringLiteral | LangStringLiteral
  # Handled via is_a hierarchy above.

  NumericLiteral:
    is_a: Literal
    description: A typed numeric literal with an XML Schema datatype IRI.
    attributes:
      numeric_datatype_iri:
        range: uri
        description: XML Schema datatype IRI for this numeric literal.
      lexical_form:
        range: string
        required: true
        description: The numeric lexical form as defined by the associated XML Schema datatype.


  # ----------------------------------------------------------------
  # Values
  # ----------------------------------------------------------------

  Value:
    abstract: true
    description: >-
      An instance-level data value. Appears in FieldValue constructs and as
      typed defaults in EmbeddedArtifact properties.

  TextValue:
    is_a: Value
    description: >-
      A text value carrying either a plain string or a language-tagged string.
    attributes:
      text_literal:
        # TextLiteral ::= StringLiteral | LangStringLiteral
        range: Literal
        any_of:
          - range: StringLiteral
          - range: LangStringLiteral
        required: true
        inlined: true
        description: The text literal carried by this value, either a plain string or a language-tagged string.

  NumericValue:
    is_a: Value
    description: A value carrying a typed numeric literal.
    attributes:
      numeric_literal:
        range: NumericLiteral
        required: true
        inlined: true
        description: The typed numeric literal carried by this value.

  DateValue:
    is_a: Value
    abstract: true
    description: >-
      A date value refined into year, year-month, and full-date precision
      variants to preserve intended granularity explicitly.

  YearValue:
    is_a: DateValue
    description: A date value refined to year precision.
    attributes:
      value:
        range: Year
        required: true
        description: The calendar year carried by this value (xsd:gYear).

  FullDateValue:
    is_a: DateValue
    description: A date value refined to full calendar date precision.
    attributes:
      value:
        range: date
        required: true
        description: The full calendar date carried by this value (xsd:date).

  TimeValue:
    is_a: Value
    description: A value carrying a time-of-day.
    attributes:
      value:
        range: time
        required: true
        description: The time-of-day carried by this value (xsd:time).

  DateTimeValue:
    is_a: Value
    description: A value carrying a combined date and time.
    attributes:
      value:
        range: datetime
        required: true
        description: The date-time carried by this value (xsd:dateTime).

  ControlledTermValue:
    is_a: Value
    description: >-
      A value identifying a term drawn from a controlled vocabulary. Carries
      the term IRI, a mandatory label, and optional notation and preferred label.
    attributes:
      term_iri:
        range: uri
        required: true
        description: IRI identifying a controlled vocabulary term.
      label:
        range: string
        description: Human-readable label for this controlled term.
      notation:
        range: string
        description: Symbolic notation or code from the source ontology.
      preferred_label:
        range: string
        description: The source ontology's own preferred label for the term.

  ChoiceValue:
    is_a: Value
    abstract: true
    description: >-
      Abstract base for a value carrying a selection from a ChoiceFieldSpec's
      declared options. Concrete subclasses are LiteralChoiceValue and
      ControlledTermChoiceValue, mirroring the option kinds.

  LiteralChoiceValue:
    is_a: ChoiceValue
    description: A choice value whose selection is a literal.
    attributes:
      literal:
        range: Literal
        required: true
        inlined: true
        description: The literal that was selected from the choice options.

  ControlledTermChoiceValue:
    is_a: ChoiceValue
    description: A choice value whose selection is a controlled vocabulary term.
    attributes:
      controlled_term_value:
        range: ControlledTermValue
        required: true
        inlined: true
        description: The controlled vocabulary term that was selected from the choice options.

  LinkValue:
    is_a: Value
    description: A value carrying a hyperlink IRI and optional human-readable label.
    attributes:
      link_iri:
        range: uri
        required: true
        description: IRI (URL) carried by a LinkValue.
      link_label:
        range: string
        description: Human-readable label accompanying the link IRI.

  EmailValue:
    is_a: Value
    description: A value carrying an email address string.
    attributes:
      value:
        range: StringLiteral
        required: true
        inlined: true
        description: The email address as a string literal.

  PhoneNumberValue:
    is_a: Value
    description: A value carrying a telephone number string.
    attributes:
      value:
        range: StringLiteral
        required: true
        inlined: true
        description: The phone number as a string literal.

  ExternalAuthorityValue:
    is_a: Value
    abstract: true
    description: >-
      A value representing an identifier issued by a recognised external
      authority, paired with an optional human-readable label.
    attributes:
      label:
        range: string
        description: Human-readable label for this external authority identifier.

  OrcidValue:
    is_a: ExternalAuthorityValue
    description: A value carrying an ORCID identifier IRI.
    attributes:
      orcid_iri:
        range: uri
        pattern: "^https://orcid\\.org/\\d{4}-\\d{4}-\\d{4}-\\d{3}[\\dX]$"
        description: ORCID identifier IRI (https://orcid.org/…).

  RorValue:
    is_a: ExternalAuthorityValue
    description: A value carrying a ROR (Research Organization Registry) identifier IRI.
    attributes:
      ror_iri:
        range: uri
        pattern: "^https://ror\\.org/0[a-z0-9]{8}$"
        description: ROR (Research Organization Registry) identifier IRI (https://ror.org/…).

  DoiValue:
    is_a: ExternalAuthorityValue
    description: A value carrying a DOI (Digital Object Identifier) IRI.
    attributes:
      doi_iri:
        range: uri
        pattern: "^https://doi\\.org/10\\.\\d{4,}/.+"
        description: DOI identifier IRI (https://doi.org/…).

  PubMedIdValue:
    is_a: ExternalAuthorityValue
    description: A value carrying a PubMed identifier IRI.
    attributes:
      pub_med_iri:
        range: uri
        pattern: "^https://pubmed\\.ncbi\\.nlm\\.nih\\.gov/\\d+$"
        description: PubMed identifier IRI (https://pubmed.ncbi.nlm.nih.gov/…).

  RridValue:
    is_a: ExternalAuthorityValue
    description: A value carrying an RRID (Research Resource Identifier) IRI.
    attributes:
      rrid_iri:
        range: uri
        pattern: "^https://identifiers\\.org/RRID:[A-Z]+_\\d+$"
        description: RRID (Research Resource Identifier) IRI (https://identifiers.org/RRID:…).

  NihGrantIdValue:
    is_a: ExternalAuthorityValue
    description: A value carrying an NIH grant identifier IRI.
    attributes:
      nih_grant_iri:
        range: uri
        description: NIH grant identifier IRI.

  AttributeValue:
    is_a: Value
    description: >-
      A name–value pair for an arbitrary named property not known at
      schema-definition time. The value component may itself be any Value,
      permitting unbounded nesting.
    attributes:
      attribute_name:
        range: string
        required: true
        description: Name of the named attribute in an AttributeValue pair.
      value:
        range: Value          # recursive; generators may need special handling
        required: true
        inlined: true
        description: The value of this named attribute, which may itself be any Value.

  # ----------------------------------------------------------------
  # Instances
  # ----------------------------------------------------------------

  TemplateInstance:
    is_a: Artifact
    description: >-
      An Artifact that records data conforming to a specific Template.
      Carries its own identity, descriptive metadata, and temporal
      provenance, making it independently identifiable and catalogable.
    attributes:
      artifact_metadata:
        range: ArtifactMetadata
        required: true
        inlined: true
        description: Identity, descriptive, and provenance metadata for this artifact.
      template_reference:
        range: uri
        required: true
        description: >-
          IRI of the Template that this TemplateInstance conforms to.
          Persistent link; basis for all validation and interpretation.
      instance_values:
        range: InstanceValue
        multivalued: true
        inlined: true
        description: >-
          Ordered collection of InstanceValue entries for this TemplateInstance.

  InstanceValue:
    abstract: true
    description: >-
      An abstract base for the two forms of instance value: FieldValue and
      NestedTemplateInstance.
    attributes:
      embedded_artifact_key:
        range: AsciiIdentifier
        required: true
        description: >-
          Key identifying which embedded artifact in the Template this
          InstanceValue corresponds to.

  FieldValue:
    is_a: InstanceValue
    description: >-
      Associates an EmbeddedArtifactKey with one or more typed values for
      an EmbeddedField. Absence of a value is represented by omitting the
      FieldValue entirely; hence values requires Value+.
    attributes:
      field_values:
        range: Value
        multivalued: true
        required: true
        inlined: true
        description: >-
          One or more typed values for this FieldValue. Multiplicity must
          satisfy the Cardinality of the corresponding EmbeddedField.

  NestedTemplateInstance:
    is_a: InstanceValue
    description: >-
      Associates an EmbeddedArtifactKey with nested InstanceValue constructs
      for an EmbeddedTemplate. Supports arbitrarily deep recursive structure.
    attributes:
      instance_values:
        range: InstanceValue
        multivalued: true
        inlined: true
        description: >-
          Ordered collection of InstanceValue entries for this
          NestedTemplateInstance.
